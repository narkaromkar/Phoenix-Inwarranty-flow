name: Postman Collection Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Runs at 02:30 UTC (8:00 AM IST)
    - cron: 30 2 * * *
    # Runs at 14:00 UTC (7:30 PM IST)
    - cron: 0 14 * * *

jobs:
  run-postman-test:
    runs-on: ubuntu-latest

    steps:
    - name: checkout the code
      uses: actions/checkout@v6.0.2

    - name: Setup Node.js and npm
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '22'

    - name: install newman and htmlextra
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra

    - name: Run the collection with newman
      run: |
        newman run 'In Warrenty Flow.postman_collection.json' \
        -e 'DEV.postman_environment.json' \
        -d 'test data.csv' \
        -r cli,htmlextra
    - name: upload artifacts
      uses: actions/upload-artifact@v7.0.1
      with:
        name: newman test results
        path: newman/*.html
    
